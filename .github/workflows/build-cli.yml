name: Build UseCaseCoverageCLI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p use_case_coverage_cli

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/release/ucc dist/ucc
          tar -czf dist/ucc-linux-x86_64.tar.gz -C dist ucc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ucc-linux-x86_64
          path: dist/ucc-linux-x86_64.tar.gz
